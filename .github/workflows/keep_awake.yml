name: Keep Bot Awake

on:
  schedule:
    - cron: '*/5 * * * *' # Har 5 daqiqada uyg'otish signali yuboriladi
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          curl -s https://my-school-bot-clzi.onrender.com > /dev/null
          echo "Bot uyg'otildi: $(date)"
